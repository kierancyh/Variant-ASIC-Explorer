name: rrns_mrc_all_lane
pdk: sky130A

top_module: rrns_all_lane_top_mrc

clock:
  port: clk
  mode: auto
  max_ns_cap: 200

sources:
  - src/rrns_all_lane_cu.v
  - src/rrns_all_lane_encoder.v
  - src/rrns_all_lane_slice.v
  - src/rrns_all_lane_mrc_recon.v
  - src/rrns_all_lane_corrector_mrc.v
  - src/rrns_all_lane_top_mrc.v

precheck:
  icarus:
    enabled: true
    testbench_top: tb_rrns_all_lane_top_mrc
    testbench_sources:
      - tb/**/*.v
      - tb/**/*.sv
    vcd_name: all_lane_mrc_rtl_precheck.vcd
    stop_on_fail: true

  yosys:
    enabled: true
    stop_on_fail: true
    mode: structural

ll_policy:
  sdc: ../_shared/ll_policy/constraints.sdc
  power_fair_tcl: ../_shared/ll_policy/power_fair.tcl
  power_activity_tcl: ../_shared/ll_policy/power_activity.tcl
  gpl_cell_padding: 1
