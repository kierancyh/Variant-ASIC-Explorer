          if-no-files-found: warn

  compare-runs:
    name: Compare Runs
    runs-on: ubuntu-latest
    if: always()
    needs:
      - plan
      - rtl-precheck
      - yosys-precheck
      - coarse-sweep
      - select-coarse-bracket
      - mid-refine-sweep
      - select-mid-bracket
      - refine-sweep-1
      - select-refine-1
      - refine-sweep-2
      - select-refine-2
      - refine-sweep-3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: incoming_artifacts
          merge-multiple: false
      - name: Build run explorer outputs
        run: |
          python tools/scripts/compare_runs.py \
            --artifacts-root incoming_artifacts \
            --summary-md summary.md \
            --summary-csv summary.csv \
            --best-json best.json \
            --best-bundle-dir best-layout-bundle \
            --site-dir incoming_site \
            --site-subdir "${{ needs.plan.outputs.site_key }}" \
            --repo-slug "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --summary-synth-strategy "${{ needs.plan.outputs.summary_synth_strategy }}" \
            --summary-antenna-repair "${{ needs.plan.outputs.summary_antenna_repair }}" \
            --summary-heuristic-diode-insertion "${{ needs.plan.outputs.summary_heuristic_diode_insertion }}" \
            --summary-post-grt-design-repair "${{ needs.plan.outputs.summary_post_grt_design_repair }}" \
            --summary-post-grt-resizer-timing "${{ needs.plan.outputs.summary_post_grt_resizer_timing }}"
      - uses: actions/upload-artifact@v4
        with:
          name: run-explorer-site
          path: incoming_site/
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: best-layout-bundle
          path: best-layout-bundle/
          if-no-files-found: warn
      - uses: actions/upload-artifact@v4
        with:
          name: run-summary
          path: |
            summary.md
            summary.csv
            best.json
          if-no-files-found: error

  deploy-run-explorer:
    name: Deploy Run Explorer
    runs-on: ubuntu-latest
    needs: [plan, compare-runs]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: run-explorer-site
          path: incoming_site
      - name: Normalize downloaded site layout
        run: |
          set -euo pipefail
          if [ -d incoming_site/run-explorer-site ]; then
            rm -rf incoming_site_normalized
            mkdir -p incoming_site_normalized
            cp -a incoming_site/run-explorer-site/. incoming_site_normalized/
            rm -rf incoming_site
            mv incoming_site_normalized incoming_site
          fi
          test -f incoming_site/index.html
      - name: Prepare gh-pages worktree
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_KEY: ${{ needs.plan.outputs.site_key }}
        run: |
          set -euo pipefail
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git worktree add gh-pages origin/gh-pages
          else
            git worktree add --detach gh-pages
            git -C gh-pages checkout --orphan gh-pages
            git -C gh-pages rm -rf . || true
            git -C gh-pages commit --allow-empty -m "Initialize gh-pages"
            git -C gh-pages remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" || true
            git -C gh-pages push origin HEAD:gh-pages
          fi
          if git -C gh-pages remote get-url origin >/dev/null 2>&1; then
            git -C gh-pages remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          else
            git -C gh-pages remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          namespace_root="gh-pages/${SITE_KEY}"
          runs_root="${namespace_root}/runs"
          latest_dir="${namespace_root}/latest"
          current_run_dir="${runs_root}/${GITHUB_RUN_ID}"

          mkdir -p "${runs_root}"
          rm -rf "${current_run_dir}" "${latest_dir}"
          mkdir -p "${current_run_dir}" "${latest_dir}"

          cp -a incoming_site/. "${current_run_dir}/"
          cp -a incoming_site/. "${latest_dir}/"

          python - <<'PY'
          from pathlib import Path
          import os
          import shutil

          site_key = os.environ["SITE_KEY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          namespace_root = Path("gh-pages") / site_key
          runs_root = namespace_root / "runs"
          runs_root.mkdir(parents=True, exist_ok=True)

          run_dirs = [p for p in runs_root.iterdir() if p.is_dir()]
          run_dirs.sort(key=lambda p: int(p.name) if p.name.isdigit() else -1, reverse=True)

          for stale in run_dirs[5:]:
              shutil.rmtree(stale)

          repo_name = os.environ["GITHUB_REPOSITORY"].split("/")[-1]

          root_index = [
              "<!doctype html>",
              '<html lang="en">',
              "<head>",
              '  <meta charset="utf-8">',
              '  <meta name="viewport" content="width=device-width, initial-scale=1">',
              f"  <title>{repo_name} - ASIC Flow Run Explorer</title>",
              "</head>",
              "<body>",
              f"  <h1>{repo_name} - ASIC Flow Run Explorer</h1>",
              f'  <p><a href="{site_key}/latest/">{site_key}/latest/</a></p>',
              f'  <p><a href="{site_key}/runs/">{site_key}/runs/</a></p>',
              "</body>",
              "</html>",
          ]

          namespace_index = [
              "<!doctype html>",
              '<html lang="en">',
              "<head>",
              '  <meta charset="utf-8">',
              '  <meta http-equiv="refresh" content="0; url=latest/">',
              '  <meta name="viewport" content="width=device-width, initial-scale=1">',
              f"  <title>{site_key} - ASIC Flow Run Explorer</title>",
              "</head>",
              "<body>",
              f'  Redirecting to <a href="latest/">{site_key} latest explorer</a>...',
              f'  <p>Per-run snapshots are available under <a href="runs/{run_id}/">runs/{run_id}/</a>.</p>',
              "</body>",
              "</html>",
          ]

          kept = [p.name for p in sorted(runs_root.iterdir(), key=lambda p: int(p.name) if p.name.isdigit() else -1, reverse=True) if p.is_dir()]
          runs_lines = [
              f"# {site_key} Run Snapshots",
              "",
              f"Latest run snapshot: [{run_id}]({run_id}/)",
              "",
              "Kept runs:",
              "",
          ] + [f"- [{name}]({name}/)" for name in kept]

          Path("gh-pages/index.html").write_text("\n".join(root_index) + "\n", encoding="utf-8")
          (namespace_root / "index.html").write_text("\n".join(namespace_index) + "\n", encoding="utf-8")
          (runs_root / "index.html").write_text("\n".join(runs_lines) + "\n", encoding="utf-8")
          PY
      - name: Publish gh-pages branch
        env:
          SITE_KEY: ${{ needs.plan.outputs.site_key }}
        run: |
          set -euo pipefail
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No gh-pages changes to publish."
          else
            git commit -m "Publish explorer for ${SITE_KEY} run ${GITHUB_RUN_ID}"
            git push origin HEAD:gh-pages
          fi
      - name: Workflow Summary
        run: |
          {
            echo "## Published Run Explorer"
            echo ""
            echo "- [Open Latest Explorer](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ needs.plan.outputs.site_key }}/latest/)"
          } >> "$GITHUB_STEP_SUMMARY"
