  compare-runs:
    name: Compare Runs
    needs:
      - plan
      - coarse-sweep
      - select-coarse-bracket
      - mid-refine-sweep
      - select-mid-bracket
      - refine-sweep-1
      - select-refine-1
      - refine-sweep-2
      - select-refine-2
      - refine-sweep-3
    if: ${{ always() && needs.coarse-sweep.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Download all upstream artifacts
        uses: actions/download-artifact@v6
        with:
          path: downloaded_artifacts
      - name: Show downloaded structure
        run: |
          find downloaded_artifacts -maxdepth 8 -type f | sort | sed -n '1,400p'
      - name: Fail if no metrics were downloaded
        run: |
          COUNT="$(find downloaded_artifacts -type f -name metrics.csv | wc -l | tr -d ' ')"
          echo "Found ${COUNT} metrics.csv files"
          test "${COUNT}" != "0"
      - name: Compare runs and build explorer
        run: |
          python tools/scripts/compare_runs.py \
            --artifacts-root downloaded_artifacts \
            --summary-md _compare_summary.md \
            --summary-csv _compare_summary.csv \
            --best-json _best_run.json \
            --best-bundle-dir best-layout-bundle \
            --site-dir _site \
            --repo-slug "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --summary-synth-strategy "${{ needs.plan.outputs.summary_synth_strategy }}" \
            --summary-antenna-repair "${{ needs.plan.outputs.summary_antenna_repair }}" \
            --summary-heuristic-diode-insertion "${{ needs.plan.outputs.summary_heuristic_diode_insertion }}" \
            --summary-post-grt-design-repair "${{ needs.plan.outputs.summary_post_grt_design_repair }}" \
            --summary-post-grt-resizer-timing "${{ needs.plan.outputs.summary_post_grt_resizer_timing }}" \
            --summary-synth-strategy "${{ needs.plan.outputs.summary_synth_strategy }}" \
            --summary-antenna-repair "${{ needs.plan.outputs.summary_antenna_repair }}" \
            --summary-heuristic-diode-insertion "${{ needs.plan.outputs.summary_heuristic_diode_insertion }}" \
            --summary-post-grt-design-repair "${{ needs.plan.outputs.summary_post_grt_design_repair }}" \
            --summary-post-grt-resizer-timing "${{ needs.plan.outputs.summary_post_grt_resizer_timing }}"
      - name: Validate explorer outputs
        run: |
          test -f _compare_summary.md
          test -f _best_run.json
          test -f _site/index.html
          find _site -maxdepth 4 -type f | sort | sed -n '1,300p'
      - name: Append compare summary
        if: always()
        run: |
          cat _compare_summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload compare summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: compare-summary
          path: |
            _compare_summary.md
            _compare_summary.csv
            _best_run.json
          if-no-files-found: error
          include-hidden-files: true
      - name: Upload best-layout bundle
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: best-layout-bundle
          path: best-layout-bundle/
          if-no-files-found: error
          include-hidden-files: true
      - name: Upload run explorer site
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: run-explorer-site
          path: _site/
          if-no-files-found: error
          include-hidden-files: true

  deploy-run-explorer:
    name: Deploy Run Explorer
    needs: compare-runs
    if: ${{ needs.compare-runs.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/runs/${{ github.run_id }}/
    steps:
      - name: Download run explorer artifact
        uses: actions/download-artifact@v7
        with:
          name: run-explorer-site
          path: incoming_site

      - name: Checkout gh-pages branch if it exists
        id: checkout_gh_pages
        continue-on-error: true
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Prepare gh-pages content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ ! -d gh-pages/.git ]; then
            rm -rf gh-pages
            git init gh-pages
            cd gh-pages
            git checkout --orphan gh-pages
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            cd ..
          else
            git -C gh-pages remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          mkdir -p "gh-pages/runs/${GITHUB_RUN_ID}"
          rm -rf "gh-pages/runs/${GITHUB_RUN_ID}" "gh-pages/latest"
          mkdir -p "gh-pages/runs/${GITHUB_RUN_ID}" "gh-pages/latest"

          cp -a incoming_site/. "gh-pages/runs/${GITHUB_RUN_ID}/"
          cp -a incoming_site/. "gh-pages/latest/"

          cat > "gh-pages/index.html" <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=latest/">
            <title>ASIC Flow Run Explorer</title>
          </head>
          <body>
            <p>Redirecting to <a href="latest/">latest explorer</a>...</p>
            <p>Per-run snapshots are available under <a href="runs/${GITHUB_RUN_ID}/">runs/${GITHUB_RUN_ID}/</a>.</p>
          </body>
          </html>
          EOF

          cat > "gh-pages/runs/index.html" <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>ASIC Flow Run Snapshots</title>
          </head>
          <body>
            <h1>ASIC Flow Run Snapshots</h1>
            <p>Latest run snapshot: <a href="../runs/${GITHUB_RUN_ID}/">${GITHUB_RUN_ID}</a></p>
            <p>Browse folders in this branch for older snapshots.</p>
          </body>
          </html>
          EOF

      - name: Publish gh-pages branch
        run: |
          set -euo pipefail
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No gh-pages changes to publish."
          else
            git commit -m "Publish explorer for run ${GITHUB_RUN_ID}"
            git push origin HEAD:gh-pages
          fi

      - name: Workflow Summary
        run: |
          {
            echo "## Published Run Explorer"
            echo ""
            echo "- [Open Explorer for this Run](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/runs/${{ github.run_id }}/)"
          } >> "$GITHUB_STEP_SUMMARY"

